<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presentación de Victor uwu</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(120deg, #a1c4fd, #c2e9fb);
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }

    h1 {
      font-size: 3em;
      color: #ff6b81;
      margin-bottom: 0.2em;
      animation: bounce 1s ease infinite alternate;
    }

    h2 {
      font-size: 2em;
      color: #4f4f4f;
      margin-top: 0;
    }

    p {
      font-size: 1.2em;
      max-width: 600px;
      margin-top: 1em;
      line-height: 1.5;
    }

    @keyframes bounce {
      0% { transform: translateY(0); }
      100% { transform: translateY(-15px); }
    }

    .card {
      background: rgba(255, 255, 255, 0.8);
      padding: 2em;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9);}
      to { opacity: 1; transform: scale(1);}
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Victor uwu</h1>
    <h2>Desarrollador y amante de Arch Linux 💻🐧</h2>
    <p>
      Hola~! Esta es una presentación sencilla kawaii uwu. Me encanta explorar nuevas tecnologías, jugar con repositorios en Git, y experimentar con proyectos divertidos y educativos. Siempre aprendiendo y creciendo uwu~ 🌟
    </p>
  </div>
</body>
</html>
